<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مركز المهام والتحديات | Ivan Tasks</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ivan: { red: '#C8102E', darkBg: '#050509', darkCard: '#0D0F18', darkBorder: '#1E2336', lightBg: '#F3F4F6', lightCard: '#FFFFFF', lightBorder: '#E5E7EB' },
                        neon: { blue: '#00D4FF', purple: '#9D4EDD', green: '#00F58A', orange: '#FF9E00' }
                    },
                    fontFamily: { cairo: ['Cairo', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; transition: background-color 0.4s, color 0.4s; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .font-en { font-family: 'Outfit', sans-serif; }
        
        .dark body { background-color: #050509; color: #F8FAFC; }
        body:not(.dark) { background-color: #F3F4F6; color: #0F172A; }

        /* تدرجات النصوص */
        .gradient-text { background: linear-gradient(90deg, #00D4FF, #9D4EDD); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* الفلاتر العلوية (الأقسام) */
        .filter-btn {
            padding: 10px 20px; border-radius: 14px; font-weight: 800; font-size: 13px;
            white-space: nowrap; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }
        .dark .filter-btn { background: #131624; border-color: #1E2336; color: #94A3B8; }
        body:not(.dark) .filter-btn { background: #FFFFFF; border-color: #E5E7EB; color: #64748B; }
        
        .filter-btn.active {
            background: linear-gradient(135deg, #9D4EDD, #00D4FF); color: white; border-color: transparent;
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.3); transform: translateY(-2px);
        }

        /* تصميم بطاقة المهمة (مستوحى من صورتك) */
        .task-card {
            border-radius: 20px; padding: 20px; margin-bottom: 16px; transition: all 0.3s ease;
            border: 1px solid; position: relative; overflow: hidden;
        }
        .dark .task-card { background: #0D0F18; border-color: #1E2336; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        body:not(.dark) .task-card { background: #FFFFFF; border-color: #E5E7EB; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
        
        .task-card:hover { transform: translateY(-3px); }
        .dark .task-card:hover { border-color: rgba(0, 212, 255, 0.3); }
        body:not(.dark) .task-card:hover { border-color: rgba(157, 78, 221, 0.3); }

        /* التاغات (Tags) للحالة */
        .status-tag { padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: 900; display: inline-flex; align-items: center; gap: 4px; }
        .tag-pending { background: rgba(255, 158, 0, 0.1); color: #FF9E00; border: 1px solid rgba(255, 158, 0, 0.2); }
        .tag-done { background: rgba(0, 245, 138, 0.1); color: #00F58A; border: 1px solid rgba(0, 245, 138, 0.2); }
        body:not(.dark) .tag-done { background: #DCFCE7; color: #16A34A; border-color: #BBF7D0; }

        /* زر الإنجاز (Checkbox) */
        .check-circle {
            width: 32px; height: 32px; border-radius: 10px; border: 2px solid;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
        }
        .dark .check-circle { border-color: #334155; background: #1E293B; }
        body:not(.dark) .check-circle { border-color: #CBD5E1; background: #F8FAFC; }
        
        .task-card.done .check-circle {
            background: #00F58A; border-color: #00F58A; color: #050509;
            box-shadow: 0 0 15px rgba(0, 245, 138, 0.4); transform: scale(1.1);
        }
        body:not(.dark) .task-card.done .check-circle { background: #16A34A; border-color: #16A34A; color: white; box-shadow: none; }
        
        .task-card.done .task-title { text-decoration: line-through; opacity: 0.5; }

        /* شريط الإنجاز */
        .progress-track { width: 100%; height: 6px; border-radius: 6px; overflow: hidden; }
        .dark .progress-track { background: #1E2336; }
        body:not(.dark) .progress-track { background: #E5E7EB; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #9D4EDD, #00D4FF); transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        /* لوحة الإدارة */
        #adminPanel { max-height: 0; overflow: hidden; opacity: 0; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        #adminPanel.open { max-height: 800px; opacity: 1; padding-bottom: 24px; margin-top: 16px; }
        
        .input-app { width: 100%; border: 1px solid; border-radius: 14px; padding: 14px 16px; font-weight: 700; font-size: 14px; outline: none; transition: 0.3s; }
        .dark .input-app { background: #131624; border-color: #1E2336; color: white; }
        body:not(.dark) .input-app { background: #F8FAFC; border-color: #E5E7EB; color: black; }
        .input-app:focus { border-color: #9D4EDD; }

        .admin-controls { display: none; }
        .admin-active .admin-controls { display: flex; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-up { animation: fadeUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen relative pb-12">

    <header class="h-16 sticky top-0 z-50 px-5 flex items-center justify-between bg-white/80 dark:bg-[#050509]/80 backdrop-blur-xl border-b border-gray-200 dark:border-white/5">
        <a href="index.html" class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-[#131624] border border-gray-200 dark:border-[#1E2336] flex items-center justify-center text-gray-800 dark:text-white transition-all hover:scale-105">
            <i class="fa-solid fa-arrow-right"></i>
        </a>
        
        <div ondblclick="authenticateAdmin()" class="font-en text-xl font-black tracking-widest uppercase cursor-pointer select-none">
            IVAN <span class="gradient-text">TASKS</span>
        </div>
        
        <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-[#131624] border border-gray-200 dark:border-[#1E2336] flex items-center justify-center text-indigo-500 dark:text-amber-400 transition-all hover:scale-105">
            <i class="fa-solid fa-moon dark:hidden"></i>
            <i class="fa-solid fa-sun hidden dark:block"></i>
        </button>
    </header>

    <main class="max-w-2xl mx-auto p-4 lg:p-6 mt-2">
        
        <div class="mb-6 flex items-center justify-between bg-white dark:bg-[#0D0F18] border border-gray-200 dark:border-[#1E2336] rounded-2xl p-5 shadow-sm">
            <div class="flex-1 pr-4 border-r-2 border-gray-100 dark:border-[#1E2336]">
                <h2 class="text-xl font-black text-gray-900 dark:text-white mb-1">معدل الإنجاز اليومي</h2>
                <p class="text-xs font-bold text-gray-500">أنجز مهامك لتصل للقمة!</p>
                <div class="progress-track mt-3">
                    <div id="progressBar" class="progress-fill"></div>
                </div>
            </div>
            <div class="pl-2 flex flex-col items-center justify-center">
                <span id="progressText" class="font-en font-black text-3xl gradient-text">0%</span>
            </div>
        </div>

        <div class="mb-6 flex items-center gap-3 overflow-x-auto no-scrollbar pb-2">
            <button onclick="filterTasks('الكل')" class="filter-btn active" id="filter-الكل"><i class="fa-solid fa-layer-group"></i> الكل</button>
            <button onclick="filterTasks('التسويق')" class="filter-btn" id="filter-التسويق"><i class="fa-solid fa-bullhorn text-pink-500"></i> التسويق</button>
            <button onclick="filterTasks('المبيعات')" class="filter-btn" id="filter-المبيعات"><i class="fa-solid fa-cart-shopping text-blue-500"></i> المبيعات</button>
            <button onclick="filterTasks('التوصيل')" class="filter-btn" id="filter-التوصيل"><i class="fa-solid fa-truck text-orange-500"></i> التوصيل</button>
            <button onclick="filterTasks('المخازن')" class="filter-btn" id="filter-المخازن"><i class="fa-solid fa-boxes-stacked text-purple-500"></i> المخازن</button>
        </div>

        <div id="adminPanel">
            <div class="bg-gray-50 dark:bg-[#0D0F18] border-2 border-purple-500/30 rounded-3xl p-6 relative">
                <div class="absolute -top-3 right-6 bg-gradient-to-r from-purple-500 to-blue-500 text-white text-xs font-black px-4 py-1 rounded-full font-en uppercase">Admin Panel</div>
                
                <h3 class="text-lg font-black mb-4 mt-2 text-gray-900 dark:text-white"><i class="fa-solid fa-plus-circle text-purple-500"></i> إضافة مهمة جديدة</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                    <select id="taskDept" class="input-app">
                        <option value="التسويق">التسويق (مازن)</option>
                        <option value="المبيعات">المبيعات (روان)</option>
                        <option value="التوصيل">التوصيل (أبو عمر)</option>
                        <option value="المخازن">المخازن (ديار)</option>
                    </select>
                    <select id="taskPoints" class="input-app text-green-600 font-black">
                        <option value="5">مهمة عادية (+5 نقاط)</option>
                        <option value="10">مهمة متوسطة (+10 نقاط)</option>
                        <option value="20">مهمة كبرى (+20 نقطة)</option>
                    </select>
                </div>
                
                <textarea id="taskContent" rows="2" placeholder="اكتب تفاصيل المهمة بوضوح..." class="input-app mb-4 resize-none"></textarea>

                <button onclick="addTask()" class="w-full bg-gradient-to-r from-purple-600 to-blue-500 text-white font-black py-4 rounded-xl text-lg transition-all hover:opacity-90">
                    إرسال المهمة للقسم <i class="fa-solid fa-paper-plane ml-2"></i>
                </button>
            </div>
        </div>

        <div id="tasksFeed" class="mt-2">
            </div>

    </main>

    <script>
        // 1. نظام الثيم
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('ivanTheme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('ivanTheme') === 'light') { document.documentElement.classList.remove('dark'); }

        // 2. نظام الإدارة السري
        let isAdmin = false;
        function authenticateAdmin() {
            if (isAdmin) {
                isAdmin = false; document.body.classList.remove('admin-active'); document.getElementById('adminPanel').classList.remove('open');
                alert('🔒 تم الخروج من وضع الإدارة.'); return;
            }
            const pass = prompt('أدخل شفرة المشرفين:');
            if (pass === 'Ivan@2026$$') { 
                isAdmin = true; document.body.classList.add('admin-active'); document.getElementById('adminPanel').classList.add('open');
            } else if (pass !== null) { alert('❌ الشفرة غير صحيحة!'); }
        }

        // 3. قاعدة البيانات المحلية
        let currentFilter = 'الكل';
        
        const defaultTasks = [
            { id: 1, dept: "التسويق", content: "تجهيز بوست العروض الجديدة ونشره قبل الساعة 2 ظهراً.", points: 10, done: false, time: "10:00 ص" },
            { id: 2, dept: "المبيعات", content: "التواصل مع الزبائن القدامى وإرسال كاتالوج غرف النوم.", points: 5, done: true, time: "11:30 ص" },
            { id: 3, dept: "التوصيل", content: "تأكيد موعد التسليم مع زبائن طقم الكنب في منطقة زاخو.", points: 10, done: false, time: "01:00 م" }
        ];

        function loadTasks() {
            let tasks = JSON.parse(localStorage.getItem('ivan_new_tasks_db'));
            if (!tasks || tasks.length === 0) { tasks = defaultTasks; localStorage.setItem('ivan_new_tasks_db', JSON.stringify(tasks)); }
            renderTasks();
        }

        // 4. رسم وتصفية المهام
        function filterTasks(dept) {
            currentFilter = dept;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('filter-' + dept).classList.add('active');
            renderTasks();
        }

        function renderTasks() {
            let tasks = JSON.parse(localStorage.getItem('ivan_new_tasks_db')) || [];
            const feed = document.getElementById('tasksFeed');
            feed.innerHTML = '';
            
            let totalTasks = 0; let doneTasks = 0;

            let filteredTasks = tasks.filter(t => currentFilter === 'الكل' || t.dept === currentFilter);
            filteredTasks.sort((a, b) => a.done === b.done ? b.id - a.id : a.done ? 1 : -1);

            filteredTasks.forEach(task => {
                totalTasks++; if(task.done) doneTasks++;

                // أيقونات وألوان الأقسام
                let deptIcon = "fa-briefcase"; let deptColor = "from-gray-500 to-gray-600"; let supervisor = "المشرف";
                if(task.dept === "التسويق") { deptIcon = "fa-bullhorn"; deptColor = "from-pink-500 to-rose-500"; supervisor = "مازن"; }
                if(task.dept === "المبيعات") { deptIcon = "fa-cart-shopping"; deptColor = "from-blue-500 to-cyan-500"; supervisor = "روان"; }
                if(task.dept === "التوصيل") { deptIcon = "fa-truck-fast"; deptColor = "from-orange-500 to-amber-500"; supervisor = "أبو عمر"; }
                if(task.dept === "المخازن") { deptIcon = "fa-boxes-stacked"; deptColor = "from-purple-500 to-indigo-500"; supervisor = "ديار"; }

                const card = document.createElement('div');
                card.className = `task-card fade-up ${task.done ? 'done' : ''}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br ${deptColor} text-white flex items-center justify-center shadow-lg">
                                <i class="fa-solid ${deptIcon}"></i>
                            </div>
                            <div>
                                <h4 class="font-black text-sm text-gray-900 dark:text-white">${task.dept}</h4>
                                <span class="text-[10px] text-gray-500 font-bold">بإشراف: ${supervisor}</span>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-2">
                            ${task.done 
                                ? `<span class="status-tag tag-done"><i class="fa-solid fa-check-double"></i> مكتمل</span>`
                                : `<span class="status-tag tag-pending"><i class="fa-solid fa-hourglass-half"></i> قيد الانتظار</span>`
                            }
                            <button onclick="deleteTask(${task.id})" class="admin-controls w-8 h-8 rounded-lg bg-red-50 dark:bg-red-900/20 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex gap-4 items-start">
                        <div class="flex-1">
                            <p class="task-title text-[15px] font-bold text-gray-800 dark:text-gray-200 leading-relaxed mb-3">${task.content}</p>
                            
                            <div class="flex items-center gap-4">
                                <span class="text-xs font-black text-green-500 bg-green-50 dark:bg-green-900/10 px-2.5 py-1 rounded-lg border border-green-200 dark:border-green-900/30">
                                    <i class="fa-solid fa-gem text-[10px]"></i> +${task.points} نقاط
                                </span>
                                <span class="text-[11px] font-bold text-gray-400"><i class="fa-regular fa-clock"></i> ${task.time}</span>
                            </div>
                        </div>
                        
                        <div class="check-circle" onclick="toggleTaskStatus(${task.id})">
                            <i class="fa-solid fa-check ${task.done ? 'block' : 'hidden'} text-sm"></i>
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });

            if (filteredTasks.length === 0) {
                feed.innerHTML = `
                    <div class="text-center py-12">
                        <div class="w-20 h-20 mx-auto bg-gray-100 dark:bg-[#131624] rounded-full flex items-center justify-center text-gray-400 mb-4">
                            <i class="fa-solid fa-mug-hot text-3xl"></i>
                        </div>
                        <h3 class="font-black text-lg text-gray-800 dark:text-white mb-1">لا توجد مهام حالياً</h3>
                        <p class="text-sm font-bold text-gray-500">جميع المهام في هذا القسم منجزة أو غير متوفرة.</p>
                    </div>`;
            }

            // تحديث شريط التقدم
            let percentage = totalTasks === 0 ? 0 : Math.round((doneTasks / totalTasks) * 100);
            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('progressText').innerText = percentage + '%';
        }

        // 5. التفاعل مع المهام
        function toggleTaskStatus(taskId) {
            let tasks = JSON.parse(localStorage.getItem('ivan_new_tasks_db'));
            let task = tasks.find(t => t.id === taskId);
            if (task) {
                task.done = !task.done;
                localStorage.setItem('ivan_new_tasks_db', JSON.stringify(tasks));
                renderTasks(); 
            }
        }

        function addTask() {
            const dept = document.getElementById('taskDept').value;
            const points = document.getElementById('taskPoints').value;
            const content = document.getElementById('taskContent').value;
            
            if (!content) { alert('❌ يرجى كتابة تفاصيل المهمة!'); return; }

            const now = new Date();
            const timeString = now.toLocaleTimeString('ar-IQ', { hour: '2-digit', minute:'2-digit' });

            const newTask = {
                id: now.getTime(), dept: dept, points: parseInt(points), content: content, done: false, time: timeString
            };

            let tasks = JSON.parse(localStorage.getItem('ivan_new_tasks_db')) || [];
            tasks.push(newTask);
            localStorage.setItem('ivan_new_tasks_db', JSON.stringify(tasks));
            
            document.getElementById('taskContent').value = '';
            filterTasks(dept); // توجيه للقسم الذي تمت الإضافة له
        }

        function deleteTask(taskId) {
            if (confirm('هل أنت متأكد من حذف هذه المهمة نهائياً؟')) {
                let tasks = JSON.parse(localStorage.getItem('ivan_new_tasks_db')) || [];
                tasks = tasks.filter(t => t.id !== taskId);
                localStorage.setItem('ivan_new_tasks_db', JSON.stringify(tasks));
                renderTasks(); 
            }
        }

        window.onload = loadTasks;
    </script>
</body>
</html>
