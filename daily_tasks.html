<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة المهام | Ivan Tasks</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ivan: { darkBg: '#05050A', darkCard: '#0D0F18', lightBg: '#F3F4F6', lightCard: '#FFFFFF' },
                        neon: { blue: '#00D4FF', purple: '#9D4EDD', green: '#00F58A' }
                    },
                    fontFamily: { cairo: ['Cairo', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; transition: 0.3s; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .font-en { font-family: 'Outfit', sans-serif; }
        
        .dark body { background-color: #05050A; color: #F8FAFC; }
        html:not(.dark) body { background-color: #F3F4F6; color: #0F172A; }

        .gradient-text { background: linear-gradient(90deg, #00D4FF, #9D4EDD); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* شريط التفرع (الأقسام) */
        .tab-btn {
            padding: 10px 20px; border-radius: 16px; font-weight: 800; font-size: 13px; cursor: pointer;
            transition: 0.3s; white-space: nowrap; border: 1px solid transparent; display: flex; align-items: center; gap: 8px;
        }
        .dark .tab-btn { background: #131624; color: #94A3B8; border-color: #1E2336; }
        html:not(.dark) .tab-btn { background: #FFFFFF; color: #64748B; border-color: #E5E7EB; }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #9D4EDD, #00D4FF); color: white; border-color: transparent;
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4); transform: translateY(-2px);
        }

        /* بطاقة المهمة */
        .task-card {
            border-radius: 20px; padding: 20px; margin-bottom: 16px; transition: 0.3s;
            border: 1px solid; display: flex; gap: 16px; position: relative; overflow: hidden;
        }
        .dark .task-card { background: #0D0F18; border-color: #1E2336; }
        html:not(.dark) .task-card { background: #FFFFFF; border-color: #E5E7EB; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        
        .dark .task-card:hover { border-color: rgba(0, 212, 255, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.4); transform: translateY(-2px); }
        html:not(.dark) .task-card:hover { border-color: rgba(157, 78, 221, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.08); transform: translateY(-2px); }

        /* علامة الإنجاز (المربع التفاعلي) */
        .check-box {
            width: 32px; height: 32px; border-radius: 10px; border: 2px solid; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
        }
        .dark .check-box { border-color: #334155; background: #1E293B; }
        html:not(.dark) .check-box { border-color: #CBD5E1; background: #F8FAFC; }

        .task-card.done { opacity: 0.7; }
        .task-card.done .check-box {
            background: #00F58A; border-color: #00F58A; color: #05050A;
            box-shadow: 0 0 15px rgba(0, 245, 138, 0.5); transform: scale(1.1);
        }
        html:not(.dark) .task-card.done .check-box { background: #16A34A; border-color: #16A34A; color: white; box-shadow: none; }
        .task-card.done .task-title { text-decoration: line-through; color: #64748B; }

        /* شريط التقدم */
        .progress-bg { width: 100%; height: 8px; border-radius: 8px; overflow: hidden; }
        .dark .progress-bg { background: #1E2336; }
        html:not(.dark) .progress-bg { background: #E5E7EB; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #9D4EDD, #00D4FF); transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        /* لوحة الإدارة */
        #adminPanel { max-height: 0; overflow: hidden; opacity: 0; transition: 0.5s ease; }
        #adminPanel.open { max-height: 800px; opacity: 1; padding-bottom: 20px; margin-top: 15px; }
        .input-style { width: 100%; border: 1px solid; border-radius: 14px; padding: 14px; font-weight: 700; outline: none; transition: 0.3s; }
        .dark .input-style { background: #131624; border-color: #1E2336; color: white; }
        html:not(.dark) .input-style { background: #F8FAFC; border-color: #E5E7EB; color: black; }
        .input-style:focus { border-color: #9D4EDD; }

        .admin-controls { display: none; }
        .admin-active .admin-controls { display: block; } /* تظهر فقط في وضع الإدارة */

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-up { animation: fadeUp 0.4s ease both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen relative pb-12">

    <header class="h-16 sticky top-0 z-50 px-4 flex items-center justify-between bg-white/90 dark:bg-[#05050A]/90 backdrop-blur-xl border-b border-gray-200 dark:border-white/5 shadow-sm dark:shadow-none">
        <a href="index.html" class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-[#131624] border border-gray-200 dark:border-[#1E2336] flex items-center justify-center text-gray-800 dark:text-white transition-all hover:scale-105">
            <i class="fa-solid fa-arrow-right"></i>
        </a>
        
        <div ondblclick="authenticateAdmin()" class="font-en text-xl font-black tracking-widest uppercase cursor-pointer select-none" title="اضغط مرتين للدخول للإدارة">
            IVAN <span class="gradient-text">TASKS</span>
        </div>
        
        <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-[#131624] border border-gray-200 dark:border-[#1E2336] flex items-center justify-center text-indigo-500 dark:text-amber-400 transition-all hover:scale-105">
            <i class="fa-solid fa-moon dark:hidden"></i>
            <i class="fa-solid fa-sun hidden dark:block"></i>
        </button>
    </header>

    <main class="max-w-2xl mx-auto p-4 lg:p-6 mt-2">
        
        <div class="mb-6 bg-white dark:bg-[#0D0F18] border border-gray-200 dark:border-[#1E2336] rounded-2xl p-5 shadow-sm dark:shadow-none flex items-center gap-4">
            <div class="flex-1 pr-2 border-r-4 border-purple-500">
                <h2 class="text-lg font-black text-gray-900 dark:text-white mb-1">مؤشر الإنجاز اليومي</h2>
                <p class="text-[11px] font-bold text-gray-500 mb-3">أنهِ مهامك لترفع نسبة إنجاز المعرض!</p>
                <div class="progress-bg"><div id="progressBar" class="progress-fill"></div></div>
            </div>
            <div class="flex flex-col items-center justify-center min-w-[70px]">
                <span id="progressText" class="font-en font-black text-3xl gradient-text">0%</span>
            </div>
        </div>

        <div class="mb-6 flex items-center gap-3 overflow-x-auto no-scrollbar pb-2" id="filtersContainer">
            <button onclick="filterTasks('الكل')" class="tab-btn active" id="filter-الكل"><i class="fa-solid fa-layer-group"></i> الكل</button>
            <button onclick="filterTasks('التسويق')" class="tab-btn" id="filter-التسويق"><i class="fa-solid fa-bullhorn text-pink-500"></i> التسويق</button>
            <button onclick="filterTasks('المبيعات')" class="tab-btn" id="filter-المبيعات"><i class="fa-solid fa-cart-shopping text-blue-500"></i> المبيعات</button>
            <button onclick="filterTasks('التوصيل')" class="tab-btn" id="filter-التوصيل"><i class="fa-solid fa-truck text-orange-500"></i> التوصيل</button>
            <button onclick="filterTasks('المخازن')" class="tab-btn" id="filter-المخازن"><i class="fa-solid fa-boxes-stacked text-purple-500"></i> المخازن</button>
            <button onclick="filterTasks('النجارين')" class="tab-btn" id="filter-النجارين"><i class="fa-solid fa-hammer text-red-500"></i> النجارين</button>
            <button onclick="filterTasks('التنظيفات')" class="tab-btn" id="filter-التنظيفات"><i class="fa-solid fa-broom text-teal-500"></i> التنظيفات</button>
        </div>

        <div id="adminPanel">
            <div class="bg-gray-50 dark:bg-[#0D0F18] border-2 border-purple-500/40 rounded-3xl p-6 relative shadow-xl">
                <div class="absolute -top-3 right-6 bg-gradient-to-r from-purple-500 to-blue-500 text-white text-xs font-black px-4 py-1 rounded-full uppercase">Admin Panel</div>
                
                <h3 class="text-lg font-black mb-4 mt-2 text-gray-900 dark:text-white flex items-center gap-2">
                    <i class="fa-solid fa-plus-circle text-purple-500"></i> تكليف بمهمة جديدة
                </h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                    <select id="taskDept" class="input-style">
                        <option value="التسويق">التسويق والإعلام (مازن)</option>
                        <option value="المبيعات">المبيعات (روان)</option>
                        <option value="التوصيل">التوصيل والمناولة (أبو عمر)</option>
                        <option value="المخازن">المخازن (ديار)</option>
                        <option value="النجارين">النجارين والتركيب</option>
                        <option value="التنظيفات">قسم التنظيفات</option>
                    </select>
                    <select id="taskPoints" class="input-style text-green-600 font-black">
                        <option value="5">مهمة عادية (+5 نقاط)</option>
                        <option value="10">مهمة متوسطة (+10 نقاط)</option>
                        <option value="20">مهمة كبرى (+20 نقطة)</option>
                    </select>
                </div>
                
                <textarea id="taskContent" rows="2" placeholder="اكتب تفاصيل المهمة المطلوب إنجازها..." class="input-style mb-4 resize-none"></textarea>

                <button onclick="addTask()" class="w-full bg-gradient-to-r from-purple-600 to-blue-500 text-white font-black py-4 rounded-xl text-lg transition-all hover:opacity-90 shadow-lg shadow-purple-500/20">
                    إرسال المهمة للقسم <i class="fa-solid fa-paper-plane ml-2"></i>
                </button>
            </div>
        </div>

        <div id="tasksFeed" class="mt-2"></div>

    </main>

    <script>
        // --- 1. الثيم الصارم ---
        function toggleTheme() {
            const html = document.getElementById('htmlTag');
            html.classList.toggle('dark');
            localStorage.setItem('ivanTheme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('ivanTheme') === 'light') { document.getElementById('htmlTag').classList.remove('dark'); }

        // --- 2. نظام الإدارة ---
        let isAdmin = false;
        function authenticateAdmin() {
            if (isAdmin) {
                isAdmin = false; document.body.classList.remove('admin-active'); document.getElementById('adminPanel').classList.remove('open');
                alert('🔒 تم إغلاق لوحة التحكم.'); return;
            }
            if (prompt('أدخل شفرة المشرفين:') === 'Ivan@2026$$') { 
                isAdmin = true; document.body.classList.add('admin-active'); document.getElementById('adminPanel').classList.add('open');
            } else { alert('❌ الشفرة غير صحيحة!'); }
        }

        // --- 3. قاعدة البيانات (مفتاح جديد كلياً لتفادي مشاكل الهاتف القديمة) ---
        const STORAGE_KEY = 'ivan_tasks_final_v4'; 
        let currentFilter = 'الكل';
        
        const defaultTasks = [
            { id: 1, dept: "التسويق", content: "تجهيز بوست العروض وتصوير الطابق الأول.", points: 10, done: false, time: "10:00 ص" },
            { id: 2, dept: "المبيعات", content: "التواصل مع الزبائن لتأكيد الطلبيات.", points: 5, done: true, time: "11:30 ص" },
            { id: 3, dept: "التوصيل", content: "توصيل بضاعة زاخو وتأكيد الاستلام.", points: 20, done: false, time: "01:00 م" }
        ];

        function getTasks() {
            try {
                let stored = localStorage.getItem(STORAGE_KEY);
                return stored ? JSON.parse(stored) : defaultTasks;
            } catch (e) { return defaultTasks; }
        }

        function saveTasks(tasksArray) {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasksArray)); } 
            catch (e) { console.error("Error saving tasks"); }
        }

        function loadTasks() {
            let tasks = getTasks();
            saveTasks(tasks); // ضمان وجودها
            renderTasks();
        }

        // --- 4. العرض والفلترة ---
        function filterTasks(dept) {
            currentFilter = dept;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('filter-' + dept).classList.add('active');
            renderTasks();
        }

        function renderTasks() {
            let tasks = getTasks();
            const feed = document.getElementById('tasksFeed');
            feed.innerHTML = '';
            
            let totalTasks = 0; let doneTasks = 0;

            let filteredTasks = tasks.filter(t => currentFilter === 'الكل' || t.dept === currentFilter);
            
            // الترتيب: الغير منجز أولاً، ثم المنجز
            filteredTasks.sort((a, b) => {
                if (a.done === b.done) return b.id - a.id;
                return a.done ? 1 : -1;
            });

            filteredTasks.forEach(task => {
                totalTasks++; if(task.done) doneTasks++;

                // تحديد أيقونة وألوان القسم
                let dIcon = "fa-briefcase"; let dColor = "from-gray-500 to-gray-600";
                if(task.dept === "التسويق") { dIcon = "fa-bullhorn"; dColor = "from-pink-500 to-rose-500"; }
                if(task.dept === "المبيعات") { dIcon = "fa-cart-shopping"; dColor = "from-blue-500 to-cyan-500"; }
                if(task.dept === "التوصيل") { dIcon = "fa-truck-fast"; dColor = "from-orange-500 to-amber-500"; }
                if(task.dept === "المخازن") { dIcon = "fa-boxes-stacked"; dColor = "from-purple-500 to-indigo-500"; }
                if(task.dept === "النجارين") { dIcon = "fa-hammer"; dColor = "from-red-500 to-rose-600"; }
                if(task.dept === "التنظيفات") { dIcon = "fa-broom"; dColor = "from-teal-500 to-emerald-500"; }

                const card = document.createElement('div');
                card.className = `task-card fade-up ${task.done ? 'done' : ''}`;
                
                card.innerHTML = `
                    <div class="check-box" onclick="toggleTask(${task.id})">
                        <i class="fa-solid fa-check ${task.done ? 'block' : 'hidden'} text-sm"></i>
                    </div>
                    
                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-2">
                            <div class="flex items-center gap-2">
                                <div class="w-6 h-6 rounded-md bg-gradient-to-br ${dColor} text-white flex items-center justify-center text-[10px] shadow-md">
                                    <i class="fa-solid ${dIcon}"></i>
                                </div>
                                <span class="text-[11px] font-black text-gray-500">${task.dept}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-[10px] font-bold text-gray-400">${task.time}</span>
                                <button onclick="deleteTask(${task.id})" class="admin-controls text-red-500/50 hover:text-red-500 transition-all text-sm" title="حذف المهمة">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </div>
                        
                        <p class="task-title text-sm font-bold text-gray-800 dark:text-gray-200 leading-relaxed mb-3">${task.content}</p>
                        
                        <span class="inline-flex items-center gap-1 text-[10px] font-black ${task.done ? 'text-gray-400 bg-gray-100 dark:bg-[#131624] border-gray-200 dark:border-gray-800' : 'text-green-600 bg-green-50 dark:bg-green-900/10 border-green-200 dark:border-green-900/30'} px-2 py-1 rounded-md border transition-all">
                            <i class="fa-solid fa-star"></i> +${task.points} نقاط
                        </span>
                    </div>
                `;
                feed.appendChild(card);
            });

            if (filteredTasks.length === 0) {
                feed.innerHTML = `
                    <div class="text-center py-10 fade-up">
                        <i class="fa-solid fa-mug-hot text-4xl text-gray-300 dark:text-[#1E2336] mb-3"></i>
                        <h3 class="font-black text-lg text-gray-800 dark:text-white mb-1">لا توجد مهام حالياً</h3>
                        <p class="text-xs font-bold text-gray-500">تم إنجاز كل شيء في هذا القسم!</p>
                    </div>`;
            }

            // تحديث شريط التقدم
            let percentage = totalTasks === 0 ? 0 : Math.round((doneTasks / totalTasks) * 100);
            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('progressText').innerText = percentage + '%';
        }

        // --- 5. التفاعلات (الإضافة، الحذف، الإنجاز) ---
        function toggleTask(taskId) {
            let tasks = getTasks();
            let task = tasks.find(t => t.id === taskId);
            if (task) {
                task.done = !task.done;
                saveTasks(tasks);
                renderTasks(); 
            }
        }

        function addTask() {
            const dept = document.getElementById('taskDept').value;
            const points = document.getElementById('taskPoints').value;
            const content = document.getElementById('taskContent').value;
            
            if (!content) { alert('❌ يرجى كتابة تفاصيل المهمة!'); return; }

            const now = new Date();
            const newTask = {
                id: now.getTime(), dept: dept, points: parseInt(points), content: content, done: false,
                time: now.toLocaleTimeString('ar-IQ', { hour: '2-digit', minute:'2-digit' })
            };

            let tasks = getTasks();
            tasks.push(newTask);
            saveTasks(tasks);
            
            document.getElementById('taskContent').value = '';
            filterTasks(dept); // يوجهك للقسم المضاف إليه مباشرة
        }

        function deleteTask(taskId) {
            if (confirm('هل أنت متأكد من حذف هذه المهمة من النظام؟')) {
                let tasks = getTasks();
                tasks = tasks.filter(t => t.id !== taskId);
                saveTasks(tasks);
                renderTasks(); 
            }
        }

        // تشغيل البداية
        window.onload = loadTasks;
    </script>
</body>
</html>
