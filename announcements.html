<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شبكة إيفان الاجتماعية | Ivan Social</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ivan: { red: '#C8102E', darkBg: '#05050A', darkCard: '#0A0C14', darkBorder: '#1A1E2E' },
                        neon: { blue: '#00F0FF', pink: '#FF003C', purple: '#8A2BE2' }
                    },
                    fontFamily: { cairo: ['Cairo', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #05050A; color: #F0F4FF; overflow-x: hidden; }
        .font-en { font-family: 'Outfit', sans-serif; }
        
        /* تأثيرات النيون */
        .neon-text { background: linear-gradient(90deg, #00F0FF, #8A2BE2, #FF003C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .neon-border { border: 1px solid rgba(0, 240, 255, 0.15); box-shadow: 0 0 15px rgba(0, 240, 255, 0.05); }
        .neon-border:hover { border-color: rgba(138, 43, 226, 0.4); box-shadow: 0 0 25px rgba(138, 43, 226, 0.15); }

        .news-card {
            background: rgba(10, 12, 20, 0.85); backdrop-filter: blur(12px);
            border-radius: 20px; padding: 24px; margin-bottom: 30px;
            transition: all 0.4s ease; position: relative; overflow: hidden;
        }

        /* لوحة الإدارة المخفية */
        #adminPanel { max-height: 0; overflow: hidden; opacity: 0; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        #adminPanel.open { max-height: 1200px; opacity: 1; padding-bottom: 24px; margin-top: 20px; }

        .input-neon {
            width: 100%; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 16px; font-weight: 600; outline: none; transition: 0.3s; color: white;
        }
        .input-neon:focus { border-color: #00F0FF; box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); }

        .file-btn { position: relative; overflow: hidden; display: inline-block; width: 100%; cursor: pointer; }
        .file-btn input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; width: 100%; }
        .media-preview { border-radius: 16px; margin-top: 16px; max-height: 450px; width: 100%; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        
        /* أزرار الحذف للأدمن */
        .admin-controls { display: none; }
        .admin-active .admin-controls { display: flex; }

        /* التفاعلات (الإعجاب والتعليقات) */
        .action-btn { transition: all 0.2s; cursor: pointer; }
        .action-btn:hover { transform: scale(1.1); }
        .action-btn.liked { color: #FF003C; text-shadow: 0 0 15px rgba(255, 0, 60, 0.6); }

        /* قسم التعليقات */
        .comments-section { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; opacity: 0; }
        .comments-section.open { max-height: 1000px; opacity: 1; margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.05); }
        
        .comment-bubble { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 12px 16px; margin-bottom: 12px; }
        
        /* سكرول بار أنيق */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(138, 43, 226, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #00F0FF; }
    </style>
</head>
<body class="min-h-screen relative">

    <div class="fixed top-0 left-0 w-[500px] h-[500px] bg-neon-blue/10 rounded-full blur-[150px] -z-10 pointer-events-none"></div>
    <div class="fixed bottom-0 right-0 w-[500px] h-[500px] bg-neon-purple/10 rounded-full blur-[150px] -z-10 pointer-events-none"></div>

    <header class="h-20 sticky top-0 z-50 px-6 flex items-center justify-between bg-[#05050A]/85 backdrop-blur-2xl border-b border-white/5">
        <a href="index.html" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all text-white">
            <i class="fa-solid fa-arrow-right"></i>
        </a>
        
        <div ondblclick="authenticateAdmin()" class="font-en text-xl md:text-2xl font-black tracking-widest uppercase cursor-pointer select-none" title="سر الإدارة">
            IVAN <span class="neon-text">NETWORK</span>
        </div>
        
        <div class="w-10 h-10"></div> </header>

    <main class="max-w-3xl mx-auto p-5 lg:p-10">
        
        <div class="mb-10 text-center">
            <h1 class="text-4xl lg:text-5xl font-black mb-4">شبكة <span class="neon-text">المعرض الرسمية</span></h1>
            <p class="font-bold text-gray-400 text-sm md:text-base max-w-lg mx-auto">
                منصة إيفان للتواصل الداخلي. تابع الأخبار، تفاعل مع الإعلانات، وشارك رأيك في التعليقات.
            </p>
        </div>

        <div id="adminPanel">
            <div class="bg-gray-900/60 border border-neon-purple/40 rounded-3xl p-6 lg:p-8 shadow-[0_0_40px_rgba(138,43,226,0.15)] relative">
                <div class="absolute top-0 right-8 bg-gradient-to-r from-neon-purple to-neon-pink text-white text-xs font-black px-4 py-1.5 rounded-b-xl tracking-widest font-en uppercase shadow-lg">Control Room</div>
                
                <h3 class="text-2xl font-black mb-6 mt-3 text-white flex items-center gap-3">
                    <i class="fa-solid fa-satellite-dish text-neon-blue animate-pulse"></i> بث منشور جديد
                </h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input type="text" id="postAuthor" value="معرض إيفان" placeholder="اسم الناشر (مثال: معرض إيفان)" class="input-neon">
                    <input type="text" id="postTitle" placeholder="عنوان المنشور..." class="input-neon">
                </div>
                
                <textarea id="postContent" rows="4" placeholder="اكتب التفاصيل، الأخبار، أو التعليمات..." class="input-neon mb-4 resize-none"></textarea>
                
                <div class="file-btn mb-6">
                    <div class="w-full bg-white/5 border border-dashed border-white/20 text-gray-300 font-bold py-4 rounded-xl flex items-center justify-center gap-3 hover:bg-white/10 transition-all">
                        <i class="fa-solid fa-cloud-arrow-up text-2xl text-neon-blue"></i> 
                        <span id="fileNameDisplay">إرفاق صورة أو فيديو (اختياري)</span>
                    </div>
                    <input type="file" id="mediaUpload" accept="image/*, video/*" onchange="updateFileName()">
                </div>

                <button onclick="publishPost()" class="w-full bg-gradient-to-r from-neon-blue via-neon-purple to-neon-pink text-white font-black py-4 rounded-xl text-lg hover:shadow-[0_0_30px_rgba(0,240,255,0.4)] transition-all">
                    إطلاق المنشور للجميع <i class="fa-solid fa-rocket ml-2"></i>
                </button>
            </div>
        </div>

        <div id="newsFeed" class="space-y-8 mt-6">
            </div>

    </main>

    <script>
        // --- 1. نظام الدخول السري للإدارة ---
        let isAdmin = false;
        
        function authenticateAdmin() {
            if (isAdmin) {
                isAdmin = false;
                document.body.classList.remove('admin-active');
                document.getElementById('adminPanel').classList.remove('open');
                alert('🔒 تم إغلاق لوحة التحكم بنجاح.');
                return;
            }

            const pass = prompt('أدخل شفرة الإدارة العليا:');
            // كلمة السر المتفق عليها
            if (pass === 'Ivan@2026$$') {
                isAdmin = true;
                document.body.classList.add('admin-active'); 
                document.getElementById('adminPanel').classList.add('open');
            } else if (pass !== null) {
                alert('❌ الشفرة غير صحيحة!');
            }
        }

        // --- 2. إدارة الملفات ---
        let currentMediaData = null; 
        let currentMediaType = null;

        function updateFileName() {
            const input = document.getElementById('mediaUpload');
            const display = document.getElementById('fileNameDisplay');
            
            if (input.files.length > 0) {
                const file = input.files[0];
                display.innerText = "جاهز للرفع: " + file.name;
                display.style.color = '#00F0FF';

                const reader = new FileReader();
                reader.onload = function(e) {
                    currentMediaData = e.target.result;
                    currentMediaType = file.type;
                };
                reader.readAsDataURL(file);
            }
        }

        // --- 3. قاعدة البيانات المحلية (Local Storage) ---
        const defaultPosts = [
            {
                id: 1713000000000,
                author: "معرض إيفان",
                title: "مرحباً بكم في شبكة إيفان!",
                content: "هذه المنصة مخصصة لجميع أفراد عائلة إيفان. يمكنكم هنا متابعة التعميمات، التفاعل بالقلوب، وترك استفساراتكم في التعليقات. \n\nنحن نستمع إليكم دائماً.",
                time: "منذ قليل 📌",
                mediaType: null,
                mediaData: null,
                likes: 5,
                comments: [
                    { id: 1, author: "قسم المبيعات", text: "تم الاستلام، منصة رائعة جداً!", time: "الآن" }
                ]
            }
        ];

        function loadPosts() {
            let posts = JSON.parse(localStorage.getItem('ivan_social_db'));
            if (!posts || posts.length === 0) {
                posts = defaultPosts;
                localStorage.setItem('ivan_social_db', JSON.stringify(posts));
            }
            renderPosts(posts);
        }

        // --- 4. رسم المنشورات (الواجهة) ---
        function renderPosts(posts) {
            const feed = document.getElementById('newsFeed');
            feed.innerHTML = ''; 
            
            posts.sort((a, b) => b.id - a.id).forEach(post => {
                
                // معالجة الميديا المرفقة
                let mediaHTML = '';
                if (post.mediaData) {
                    if (post.mediaType.startsWith('image/')) {
                        mediaHTML = `<img src="${post.mediaData}" class="media-preview shadow-[0_0_20px_rgba(0,240,255,0.1)]">`;
                    } else if (post.mediaType.startsWith('video/')) {
                        mediaHTML = `<video src="${post.mediaData}" class="media-preview shadow-[0_0_20px_rgba(0,240,255,0.1)]" controls></video>`;
                    }
                }

                // معالجة التعليقات
                let commentsHTML = '';
                if(post.comments && post.comments.length > 0) {
                    post.comments.forEach(comment => {
                        commentsHTML += `
                            <div class="comment-bubble group relative">
                                <div class="flex items-center justify-between mb-1">
                                    <span class="font-black text-sm text-neon-blue">${comment.author}</span>
                                    <span class="text-[10px] text-gray-500">${comment.time}</span>
                                </div>
                                <p class="text-sm font-bold text-gray-300">${comment.text}</p>
                                <button onclick="deleteComment(${post.id}, ${comment.id})" class="admin-controls absolute top-2 left-2 text-red-500/50 hover:text-red-500 text-xs transition-all" title="حذف التعليق">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        `;
                    });
                } else {
                    commentsHTML = '<p class="text-xs text-gray-500 text-center my-4 font-bold">لا توجد تعليقات بعد. كن أول من يعلق!</p>';
                }

                // بناء كرت المنشور
                const card = document.createElement('div');
                card.className = 'news-card neon-border';
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-gradient-to-r from-neon-purple to-neon-pink text-white flex items-center justify-center font-en font-black text-2xl italic shadow-[0_0_15px_rgba(255,0,60,0.4)]">i</div>
                            <div>
                                <h4 class="font-black text-lg text-white">${post.author} <i class="fa-solid fa-circle-check text-neon-blue text-xs ml-1" title="حساب رسمي"></i></h4>
                                <span class="text-xs text-gray-400 font-bold">${post.time}</span>
                            </div>
                        </div>
                        <button onclick="deletePost(${post.id})" class="admin-controls w-10 h-10 bg-red-500/10 text-red-500 rounded-xl items-center justify-center hover:bg-red-500 hover:text-white transition-all shadow-lg" title="حذف المنشور">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                    
                    <h3 class="text-2xl font-black mb-3 text-white">${post.title}</h3>
                    <p class="text-base font-bold text-gray-300 leading-relaxed whitespace-pre-line">${post.content}</p>
                    ${mediaHTML}
                    
                    <div class="flex items-center gap-6 mt-6 pt-4 border-t border-white/5">
                        <div class="flex items-center gap-2 action-btn text-gray-400 hover:text-neon-pink" onclick="toggleLike(${post.id}, this)">
                            <i class="fa-solid fa-heart text-xl"></i>
                            <span class="font-black text-sm" id="like-count-${post.id}">${post.likes || 0}</span>
                        </div>
                        <div class="flex items-center gap-2 action-btn text-gray-400 hover:text-neon-blue" onclick="toggleComments(${post.id})">
                            <i class="fa-solid fa-comment-dots text-xl"></i>
                            <span class="font-black text-sm">${post.comments ? post.comments.length : 0} تعليق</span>
                        </div>
                    </div>

                    <div id="comments-section-${post.id}" class="comments-section">
                        <div class="mb-4 max-h-60 overflow-y-auto pr-2">
                            ${commentsHTML}
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="comment-author-${post.id}" placeholder="اسمك (اختياري)" class="w-1/3 bg-black/40 border border-white/10 rounded-xl px-3 py-2 text-sm text-white focus:border-neon-blue outline-none transition-all">
                            <input type="text" id="comment-text-${post.id}" placeholder="اكتب تعليقاً..." class="flex-1 bg-black/40 border border-white/10 rounded-xl px-3 py-2 text-sm text-white focus:border-neon-blue outline-none transition-all" onkeypress="if(event.key === 'Enter') addComment(${post.id})">
                            <button onclick="addComment(${post.id})" class="bg-neon-blue/20 text-neon-blue hover:bg-neon-blue hover:text-black w-10 rounded-xl flex items-center justify-center transition-all">
                                <i class="fa-solid fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        // --- 5. وظائف النشر والحذف والتفاعل ---
        
        function publishPost() {
            const author = document.getElementById('postAuthor').value || 'معرض إيفان';
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            
            if (!title || !content) { alert('❌ يرجى كتابة العنوان والمحتوى!'); return; }

            const now = new Date();
            const timeString = 'اليوم، ' + now.toLocaleTimeString('ar-IQ', { hour: '2-digit', minute:'2-digit' });

            const newPost = {
                id: now.getTime(),
                author: author,
                title: title,
                content: content,
                time: timeString,
                mediaType: currentMediaType,
                mediaData: currentMediaData,
                likes: 0,
                comments: []
            };

            try {
                let posts = JSON.parse(localStorage.getItem('ivan_social_db')) || [];
                posts.push(newPost);
                localStorage.setItem('ivan_social_db', JSON.stringify(posts));
                
                renderPosts(posts);

                document.getElementById('postTitle').value = '';
                document.getElementById('postContent').value = '';
                document.getElementById('mediaUpload').value = '';
                document.getElementById('fileNameDisplay').innerText = 'إرفاق صورة أو فيديو (اختياري)';
                document.getElementById('fileNameDisplay').style.color = '';
                currentMediaData = null; currentMediaType = null;
                
                alert('🚀 تم إطلاق المنشور بنجاح للشبكة!');
                authenticateAdmin(); // إغلاق اللوحة
            } catch (e) {
                alert('❌ حجم الملف المرفق كبير جداً! يرجى اختيار ملف بحجم أصغر.');
            }
        }

        function deletePost(postId) {
            if (confirm('⚠️ هل أنت متأكد أنك تريد حذف هذا المنشور نهائياً من الشبكة؟')) {
                let posts = JSON.parse(localStorage.getItem('ivan_social_db')) || [];
                posts = posts.filter(post => post.id !== postId);
                localStorage.setItem('ivan_social_db', JSON.stringify(posts));
                renderPosts(posts); 
            }
        }

        function toggleLike(postId, btnElement) {
            let posts = JSON.parse(localStorage.getItem('ivan_social_db')) || [];
            let post = posts.find(p => p.id === postId);
            
            if (post) {
                // تفعيل/إلغاء الإعجاب
                if (btnElement.classList.contains('liked')) {
                    post.likes = Math.max(0, (post.likes || 1) - 1);
                    btnElement.classList.remove('liked');
                } else {
                    post.likes = (post.likes || 0) + 1;
                    btnElement.classList.add('liked');
                }
                
                document.getElementById(`like-count-${postId}`).innerText = post.likes;
                localStorage.setItem('ivan_social_db', JSON.stringify(posts));
            }
        }

        function toggleComments(postId) {
            const section = document.getElementById(`comments-section-${postId}`);
            section.classList.toggle('open');
        }

        function addComment(postId) {
            const authorInput = document.getElementById(`comment-author-${postId}`).value;
            const textInput = document.getElementById(`comment-text-${postId}`).value;
            
            if (!textInput.trim()) return;

            let posts = JSON.parse(localStorage.getItem('ivan_social_db')) || [];
            let post = posts.find(p => p.id === postId);
            
            if (post) {
                if(!post.comments) post.comments = [];
                
                const now = new Date();
                post.comments.push({
                    id: now.getTime(),
                    author: authorInput.trim() || 'عضو الفريق',
                    text: textInput,
                    time: now.toLocaleTimeString('ar-IQ', { hour: '2-digit', minute:'2-digit' })
                });

                localStorage.setItem('ivan_social_db', JSON.stringify(posts));
                renderPosts(posts); // تحديث الواجهة

                // إبقاء قسم التعليقات مفتوحاً بعد التحديث
                setTimeout(() => {
                    document.getElementById(`comments-section-${postId}`).classList.add('open');
                }, 50);
            }
        }

        function deleteComment(postId, commentId) {
            if (confirm('هل تريد حذف هذا التعليق؟')) {
                let posts = JSON.parse(localStorage.getItem('ivan_social_db')) || [];
                let post = posts.find(p => p.id === postId);
                if (post && post.comments) {
                    post.comments = post.comments.filter(c => c.id !== commentId);
                    localStorage.setItem('ivan_social_db', JSON.stringify(posts));
                    renderPosts(posts);
                    setTimeout(() => { document.getElementById(`comments-section-${postId}`).classList.add('open'); }, 50);
                }
            }
        }

        // تشغيل الوظائف عند فتح الصفحة
        window.onload = loadPosts;

    </script>
</body>
</html>
