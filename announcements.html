<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أخبار وإعلانات المعرض | إيفان</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ivan: { red: '#C8102E', darkBg: '#05050A', darkCard: '#0A0C14', darkBorder: '#1A1E2E' },
                        neon: { blue: '#00F0FF', pink: '#FF003C', purple: '#8A2BE2' }
                    },
                    fontFamily: { cairo: ['Cairo', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #05050A; color: #F0F4FF; overflow-x: hidden; }
        .font-en { font-family: 'Outfit', sans-serif; }
        
        /* تأثيرات النيون من الصورة التي أرسلتها */
        .neon-text { background: linear-gradient(90deg, #00F0FF, #8A2BE2, #FF003C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .neon-border { border: 1px solid rgba(0, 240, 255, 0.2); box-shadow: 0 0 15px rgba(0, 240, 255, 0.05); }
        .neon-border:hover { border-color: rgba(138, 43, 226, 0.5); box-shadow: 0 0 25px rgba(138, 43, 226, 0.2); }

        .news-card {
            background: rgba(10, 12, 20, 0.8); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 24px; margin-bottom: 24px;
            transition: all 0.4s ease; position: relative; overflow: hidden;
        }

        /* لوحة الإدارة المخفية */
        #adminPanel { max-height: 0; overflow: hidden; opacity: 0; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        #adminPanel.open { max-height: 1000px; opacity: 1; padding-bottom: 24px; margin-top: 20px; }

        .input-neon {
            width: 100%; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 16px; font-weight: 600; outline: none; transition: 0.3s; color: white;
        }
        .input-neon:focus { border-color: #00F0FF; box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); }

        .file-btn { position: relative; overflow: hidden; display: inline-block; width: 100%; cursor: pointer; }
        .file-btn input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; width: 100%; }

        .media-preview { border-radius: 12px; margin-top: 16px; max-height: 400px; width: 100%; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        
        .delete-btn { display: none; } /* مخفي للكل، يظهر للأدمن فقط عبر JS */
        .admin-active .delete-btn { display: flex; }
    </style>
</head>
<body class="min-h-screen relative">

    <div class="fixed top-0 left-0 w-96 h-96 bg-neon-blue/10 rounded-full blur-[150px] -z-10 pointer-events-none"></div>
    <div class="fixed bottom-0 right-0 w-96 h-96 bg-neon-purple/10 rounded-full blur-[150px] -z-10 pointer-events-none"></div>

    <header class="h-20 sticky top-0 z-50 px-6 flex items-center justify-between bg-[#05050A]/80 backdrop-blur-xl border-b border-white/5">
        <a href="index.html" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all text-white">
            <i class="fa-solid fa-arrow-right"></i>
        </a>
        
        <div ondblclick="authenticateAdmin()" class="font-en text-xl font-black tracking-widest uppercase cursor-pointer select-none" title="سر الإدارة هنا">
            IVAN <span class="neon-text">NEWS</span>
        </div>
        
        <div class="w-10 h-10"></div> </header>

    <main class="max-w-3xl mx-auto p-6 lg:p-10">
        
        <div class="mb-8 text-center">
            <h1 class="text-4xl font-black mb-3">شبكة <span class="neon-text">الأخبار الرسمية</span></h1>
            <p class="font-bold text-gray-400 text-sm">تابع التعميمات، التحديثات، وأخبار المعرض فور حدوثها.</p>
        </div>

        <div id="adminPanel">
            <div class="bg-gray-900/50 border border-neon-purple/30 rounded-3xl p-6 shadow-[0_0_30px_rgba(138,43,226,0.15)] relative">
                <div class="absolute top-0 right-6 bg-gradient-to-r from-neon-purple to-neon-pink text-white text-xs font-black px-4 py-1 rounded-b-xl tracking-widest font-en">CONTROL PANEL</div>
                
                <h3 class="text-2xl font-black mb-6 mt-2 text-white"><i class="fa-solid fa-satellite-dish text-neon-blue mr-2"></i> بث خبر جديد</h3>
                
                <input type="text" id="postTitle" placeholder="اكتب العنوان هنا..." class="input-neon mb-4">
                <textarea id="postContent" rows="4" placeholder="اكتب التفاصيل بدقة..." class="input-neon mb-4 resize-none"></textarea>
                
                <div class="file-btn mb-6">
                    <div class="w-full bg-white/5 border border-dashed border-white/20 text-gray-300 font-bold py-4 rounded-xl flex items-center justify-center gap-3 hover:bg-white/10 transition-all">
                        <i class="fa-solid fa-cloud-arrow-up text-2xl text-neon-blue"></i> 
                        <span id="fileNameDisplay">إرفاق صورة أو فيديو (اختياري)</span>
                    </div>
                    <input type="file" id="mediaUpload" accept="image/*, video/*" onchange="updateFileName()">
                </div>

                <button onclick="publishPost()" class="w-full bg-gradient-to-r from-neon-blue via-neon-purple to-neon-pink text-white font-black py-4 rounded-xl text-lg hover:shadow-[0_0_20px_rgba(0,240,255,0.4)] transition-all">
                    نشر في الشبكة <i class="fa-solid fa-paper-plane ml-2"></i>
                </button>
            </div>
        </div>

        <div id="newsFeed" class="space-y-6">
            </div>

    </main>

    <script>
        // --- 1. إعدادات الإدارة السرية ---
        let isAdmin = false;
        
        function authenticateAdmin() {
            if (isAdmin) {
                // إذا كان أدمن، نغلق اللوحة
                isAdmin = false;
                document.body.classList.remove('admin-active');
                document.getElementById('adminPanel').classList.remove('open');
                alert('🔒 تم تسجيل الخروج من وضع الإدارة.');
                return;
            }

            // طلب كلمة المرور المخفية
            const pass = prompt('أدخل شفرة الإدارة العليا:');
            // كلمة السر الجديدة والصعبة
            if (pass === 'Ivan@2026$$') {
                isAdmin = true;
                document.body.classList.add('admin-active'); // لإظهار أزرار الحذف
                document.getElementById('adminPanel').classList.add('open');
            } else if (pass !== null) {
                alert('❌ الشفرة غير صحيحة!');
            }
        }

        // --- 2. إدارة رفع الملفات ---
        let currentMediaData = null; // سيحفظ الصورة كـ Base64
        let currentMediaType = null;

        function updateFileName() {
            const input = document.getElementById('mediaUpload');
            const display = document.getElementById('fileNameDisplay');
            
            if (input.files.length > 0) {
                const file = input.files[0];
                display.innerText = "تم إرفاق: " + file.name;
                display.style.color = '#00F0FF';

                // تحويل الملف إلى رابط بيانات (Base64) لحفظه في المتصفح
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentMediaData = e.target.result;
                    currentMediaType = file.type;
                };
                reader.readAsDataURL(file);
            }
        }

        // --- 3. نظام الحفظ والاسترجاع (Local Storage) ---
        
        // أخبار افتراضية في حال كانت الصفحة فارغة
        const defaultPosts = [
            {
                id: 1713000000000,
                title: "قانون استخدام الهاتف",
                content: "يمنع منعاً باتاً استخدام الهاتف للتصوير الشخصي أثناء أوقات الدوام الرسمي. أي مخالفة لهذا القرار تعرض الموظف للمساءلة الفورية ونقطة حمراء في التقييم.",
                time: "تنبيه إداري ثابت 📌",
                mediaType: null,
                mediaData: null
            }
        ];

        // جلب الأخبار من الذاكرة أو وضع الافتراضي
        function loadPosts() {
            let posts = JSON.parse(localStorage.getItem('ivan_news_db'));
            if (!posts || posts.length === 0) {
                posts = defaultPosts;
                localStorage.setItem('ivan_news_db', JSON.stringify(posts));
            }
            renderPosts(posts);
        }

        // رسم الأخبار على الشاشة
        function renderPosts(posts) {
            const feed = document.getElementById('newsFeed');
            feed.innerHTML = ''; // مسح القديم
            
            // ترتيب من الأحدث للأقدم
            posts.sort((a, b) => b.id - a.id).forEach(post => {
                
                let mediaHTML = '';
                if (post.mediaData) {
                    if (post.mediaType.startsWith('image/')) {
                        mediaHTML = `<img src="${post.mediaData}" class="media-preview">`;
                    } else if (post.mediaType.startsWith('video/')) {
                        mediaHTML = `<video src="${post.mediaData}" class="media-preview" controls></video>`;
                    }
                }

                const card = document.createElement('div');
                card.className = 'news-card neon-border';
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-r from-neon-purple to-neon-pink text-white flex items-center justify-center font-en font-black text-xl italic shadow-[0_0_10px_rgba(255,0,60,0.5)]">i</div>
                            <div>
                                <h4 class="font-black text-lg text-white">الإدارة العليا</h4>
                                <span class="text-xs text-gray-400 font-bold">${post.time}</span>
                            </div>
                        </div>
                        <button onclick="deletePost(${post.id})" class="delete-btn w-8 h-8 bg-red-500/10 text-red-500 rounded-lg items-center justify-center hover:bg-red-500/20 transition-all" title="حذف الخبر">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                    <h3 class="text-xl font-black mb-2 text-white">${post.title}</h3>
                    <p class="text-sm font-bold text-gray-300 leading-relaxed whitespace-pre-line">${post.content}</p>
                    ${mediaHTML}
                `;
                feed.appendChild(card);
            });
        }

        // إضافة خبر جديد
        function publishPost() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            
            if (!title || !content) { alert('❌ يرجى كتابة العنوان والمحتوى!'); return; }

            const now = new Date();
            const timeString = 'اليوم، ' + now.toLocaleTimeString('ar-IQ', { hour: '2-digit', minute:'2-digit' });

            const newPost = {
                id: now.getTime(), // رقم تعريفي مميز للحذف لاحقاً
                title: title,
                content: content,
                time: timeString,
                mediaType: currentMediaType,
                mediaData: currentMediaData
            };

            // جلب البيانات، إضافتها، ثم حفظها
            try {
                let posts = JSON.parse(localStorage.getItem('ivan_news_db')) || [];
                posts.push(newPost);
                localStorage.setItem('ivan_news_db', JSON.stringify(posts));
                
                // تحديث الشاشة
                renderPosts(posts);

                // تفريغ الحقول
                document.getElementById('postTitle').value = '';
                document.getElementById('postContent').value = '';
                document.getElementById('mediaUpload').value = '';
                document.getElementById('fileNameDisplay').innerText = 'إرفاق صورة أو فيديو (اختياري)';
                document.getElementById('fileNameDisplay').style.color = '';
                currentMediaData = null;
                currentMediaType = null;
                
                alert('✅ تم نشر الخبر بنجاح لجميع الموظفين!');
            } catch (e) {
                // خطأ يحصل إذا كانت الصورة المرفوعة ضخمة جداً على ذاكرة المتصفح
                alert('❌ حجم الملف المرفق كبير جداً! يرجى اختيار ملف بحجم أصغر.');
            }
        }

        // حذف خبر
        function deletePost(postId) {
            if (confirm('⚠️ هل أنت متأكد أنك تريد حذف هذا الإعلان نهائياً؟')) {
                let posts = JSON.parse(localStorage.getItem('ivan_news_db')) || [];
                posts = posts.filter(post => post.id !== postId); // إزالة الخبر
                localStorage.setItem('ivan_news_db', JSON.stringify(posts));
                renderPosts(posts); // إعادة رسم الصفحة
            }
        }

        // تشغيل الوظائف عند فتح الصفحة
        window.onload = loadPosts;

    </script>
</body>
</html>
