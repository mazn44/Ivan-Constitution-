<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة موظفي إيفان | Ivan Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { ivan: { red: '#D91A2A', darkBg: '#080A10', darkCard: '#12141D', darkBorder: '#1F2332' } } }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .font-en { font-family: 'Outfit', sans-serif; }
        body.dark { background-color: #080A10; color: #F8FAFC; }
        body:not(.dark) { background-color: #F8FAFC; color: #0F172A; }
    </style>
</head>
<body class="relative">

    <div id="mainLoginOverlay" class="fixed inset-0 z-[200] bg-[#F8FAFC] dark:bg-[#080A10] flex items-center justify-center">
        <div class="bg-white dark:bg-ivan-darkCard border border-gray-200 dark:border-ivan-darkBorder p-8 rounded-3xl shadow-2xl max-w-md w-full mx-4 text-center">
            <div class="w-20 h-20 mx-auto rounded-2xl bg-ivan-red flex items-center justify-center shadow-lg mb-6"><span class="font-en text-4xl font-black italic text-white">i</span></div>
            <h2 class="text-3xl font-black mb-2">Ivan Show</h2>
            <p class="text-gray-500 font-bold mb-6">يرجى إدخال رمز الدخول</p>
            <input type="password" id="mainPasswordInput" placeholder="أدخل الرمز..." class="w-full bg-gray-50 dark:bg-[#080A10] border border-gray-200 dark:border-ivan-darkBorder rounded-xl px-5 py-4 text-center text-xl tracking-widest mb-4" dir="ltr">
            <p id="mainLoginError" class="text-ivan-red font-bold text-sm hidden mb-4">الرمز غير صحيح!</p>
            <button onclick="checkMainPassword()" class="w-full bg-ivan-red text-white font-bold py-4 rounded-xl text-lg">تسجيل الدخول</button>
        </div>
    </div>

    <aside id="sidebar" class="fixed top-0 right-0 h-screen w-72 lg:w-80 z-50 bg-white dark:bg-ivan-darkCard border-l border-gray-200 dark:border-ivan-darkBorder transform translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col shadow-2xl lg:shadow-none">
        <div class="h-24 flex items-center px-6 border-b border-gray-200 dark:border-ivan-darkBorder">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-ivan-red flex items-center justify-center"><span class="font-en text-2xl font-black italic text-white">i</span></div>
                <h1 class="font-en text-2xl font-black">IVAN</h1>
            </div>
            <button onclick="toggleSidebar()" class="absolute left-4 lg:hidden text-2xl text-gray-500"><i class="fa-solid fa-times"></i></button>
        </div>
        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2">
            <a href="index.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl bg-red-50 dark:bg-red-900/20 text-ivan-red font-bold border-r-4 border-ivan-red"><i class="fa-solid fa-house w-6 text-xl"></i><span class="text-lg">الرئيسية</span></a>
            <a href="departments.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl text-gray-600 dark:text-gray-400 font-bold hover:text-ivan-red dark:hover:text-ivan-red"><i class="fa-solid fa-layer-group w-6 text-xl"></i><span class="text-lg">أقسام المعرض</span></a>
            <a href="policy.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl text-gray-600 dark:text-gray-400 font-bold hover:text-ivan-red dark:hover:text-ivan-red"><i class="fa-solid fa-scale-balanced w-6 text-xl"></i><span class="text-lg">سياسة المعرض</span></a>
        </nav>
    </aside>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 z-40 hidden" onclick="toggleSidebar()"></div>

    <div class="flex flex-col min-h-screen w-full lg:w-[calc(100%-20rem)] lg:mr-auto">
        <header class="h-24 sticky top-0 z-30 px-6 flex items-center justify-between bg-white/80 dark:bg-[#080A10]/80 backdrop-blur-xl border-b border-gray-200 dark:border-ivan-darkBorder">
            <button onclick="toggleSidebar()" class="lg:hidden w-12 h-12 rounded-xl border border-gray-200 dark:border-ivan-darkBorder text-xl"><i class="fa-solid fa-bars"></i></button>
            <button onclick="toggleTheme()" class="w-12 h-12 rounded-xl border border-gray-200 dark:border-ivan-darkBorder text-xl text-indigo-600 dark:text-amber-400"><i class="fa-solid fa-moon dark:hidden"></i><i class="fa-solid fa-sun hidden dark:block"></i></button>
        </header>

        <main class="flex-1 max-w-7xl mx-auto p-6 lg:p-12 w-full">
            <h2 class="text-4xl lg:text-6xl font-black mb-12">مرحبًا بكم في <span class="text-ivan-red">بوابة إيفان</span></h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <a href="departments.html" class="bg-white dark:bg-ivan-darkCard border border-gray-200 dark:border-ivan-darkBorder rounded-3xl p-8 hover:border-ivan-red dark:hover:border-ivan-red transition-all block group">
                    <div class="w-16 h-16 rounded-2xl bg-gray-100 dark:bg-[#080A10] flex items-center justify-center text-3xl mb-6 group-hover:bg-ivan-red group-hover:text-white transition-all"><i class="fa-solid fa-layer-group"></i></div>
                    <h4 class="text-2xl font-bold mb-2">أقسام المعرض</h4>
                    <p class="text-gray-600 dark:text-gray-400 mb-6">تفاصيل وأهداف ومهام كل قسم داخل المعرض.</p>
                    <div class="text-ivan-red font-bold">الدخول للأقسام <i class="fa-solid fa-arrow-left mr-2"></i></div>
                </a>

                <a href="policy.html" class="bg-white dark:bg-ivan-darkCard border border-gray-200 dark:border-ivan-darkBorder rounded-3xl p-8 hover:border-ivan-red dark:hover:border-ivan-red transition-all block group">
                    <div class="w-16 h-16 rounded-2xl bg-gray-100 dark:bg-[#080A10] flex items-center justify-center text-3xl mb-6 group-hover:bg-ivan-red group-hover:text-white transition-all"><i class="fa-solid fa-scale-balanced"></i></div>
                    <h4 class="text-2xl font-bold mb-2">سياسة المعرض</h4>
                    <p class="text-gray-600 dark:text-gray-400 mb-6">الدستور الداخلي وقوانين العمل للموظفين.</p>
                    <div class="text-ivan-red font-bold">الاطلاع على السياسة <i class="fa-solid fa-arrow-left mr-2"></i></div>
                </a>
            </div>
        </main>
    </div>

    <script>
        // نظام الدخول
        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem('ivan_main_portal') === 'granted') {
                document.getElementById('mainLoginOverlay').style.display = 'none';
            }
        });
        function checkMainPassword() {
            const pass = document.getElementById('mainPasswordInput').value.trim().toLowerCase();
            if (pass === 'ivan123') {
                localStorage.setItem('ivan_main_portal', 'granted');
                document.getElementById('mainLoginOverlay').style.display = 'none';
            } else {
                document.getElementById('mainLoginError').classList.remove('hidden');
            }
        }
        
        // الثيم والقائمة الجانبية
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('ivanTheme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('ivanTheme') === 'light') document.documentElement.classList.remove('dark');
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }
    </script>
</body>
</html>
